<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>向雪岑品牌案例对比海报生成器</title>
  <style>
    :root{
      --brand:#002F99;
      --light:#4A6FD1;
      --navy:#09184A;
      --divider:#E0E0E0;
      --bg:#f4f7fb;
      --shadow:0 18px 48px rgba(16,33,90,.12);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      min-height:100%;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
      font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",Arial,sans-serif;
      background:var(--bg);
      color:#10204a;
    }
    button,input{font:inherit}
    
    /* 手机端工具栏 */
    .app{min-height:100vh;display:flex;flex-direction:column}
    .toolbar{
      display:flex;
      flex-wrap:wrap;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      background:#fff;
      border-bottom:1px solid rgba(26,59,153,.1);
      position:sticky;
      top:0;
      z-index:100;
    }
    .group{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      align-items:center;
    }
    .badge{
      padding:5px 10px;
      border-radius:999px;
      background:rgba(26,59,153,.08);
      color:var(--brand);
      font-size:11px;
      font-weight:600;
    }
    .btn{
      border:0;
      border-radius:10px;
      padding:10px 14px;
      cursor:pointer;
      color:#fff;
      font-weight:600;
      font-size:13px;
      background:linear-gradient(135deg,var(--brand),var(--navy));
      box-shadow:0 6px 16px rgba(26,59,153,.22);
      white-space:nowrap;
    }
    .btn.secondary{
      color:var(--brand);
      background:#fff;
      border:1px solid rgba(26,59,153,.2);
      box-shadow:0 4px 12px rgba(15,29,68,.08);
    }
    
    /* 工作区 */
    .workspace{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:12px;
      gap:10px;
    }
    .hint{
      margin:0;
      padding:0 8px 6px;
      color:rgba(16,32,74,.68);
      font-size:12px;
      text-align:center;
      line-height:1.5;
    }
    
    /* 海报容器 - 手机端适配 */
    .poster-wrap{
      width:100%;
      max-width:420px;
      aspect-ratio:1080/1660;
      background:#fff;
      overflow:hidden;
      position:relative;
      box-shadow:0 8px 32px rgba(16,33,90,.15);
      border-radius:4px;
    }
    .poster{
      position:absolute;
      left:0;
      top:0;
      width:1080px;
      height:1660px;
      background:#fff;
      transform-origin:0 0;
      user-select:none;
    }
    .editable{
      outline:none;
      cursor:text;
      white-space:pre-line;
      user-select:text;
      -webkit-user-select:text;
    }

    /* ========== 品牌栏: top:0, height:100px ========== */
    .brand-bar{
      position:absolute;
      left:40px;
      right:40px;
      top:0;
      height:100px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .brand-left{
      display:flex;
      align-items:center;
      gap:12px;
      height:100%;
    }
    .brand-name{
      font-size:36px;
      font-weight:600;
      letter-spacing:2px;
      white-space:nowrap;
      line-height:1;
      color:var(--brand);
    }
    .brand-name sup{
      font-size:14px;
      font-weight:400;
    }
    .brand-divider{
      width:1px;
      height:40px;
      background:var(--brand);
    }
    .brand-tagline{
      font-size:18px;
      font-weight:600;
      line-height:1.4;
      white-space:pre-line;
      color:var(--brand);
    }
    .brand-right{
      color:var(--light);
      text-align:right;
      font-size:13px;
      line-height:1.4;
      letter-spacing:1px;
      white-space:pre-line;
    }

    /* ========== 标题栏: top:100px, height:200px ========== */
    .title-bar{
      position:absolute;
      left:0;
      top:100px;
      width:100%;
      height:200px;
      background:linear-gradient(90deg, #2749D6 0%, #09184A 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:20px;
    }
    .title{
      color:#fff;
      font-size:84px;
      font-weight:700;
      line-height:1;
      white-space:nowrap;
      letter-spacing:6px;
    }
    /* 白色标签 */
    .title-tag{
      padding:10px 32px;
      background:#fff;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .title-tag-text{
      color:var(--brand);
      font-size:22px;
      font-weight:600;
      letter-spacing:3px;
      white-space:nowrap;
    }

    /* ========== 对比区域: top:300px, 上下排列 ========== */
    .compare-frame{
      position:absolute;
      left:40px;
      right:40px;
      top:320px;
      width:1000px;
      height:1160px;
      background:#fff;
    }
    .compare-divider{
      position:absolute;
      left:0;
      top:50%;
      width:100%;
      height:2px;
      background:var(--divider);
      transform:translateY(-1px);
      pointer-events:none;
    }
    .dropzone{
      position:absolute;
      left:0;
      right:80px; /* 为右侧标签留出空间 */
      height:50%;
      overflow:hidden;
      background:#fff;
      cursor:pointer;
      border:2px dashed rgba(26,59,153,.15);
    }
    .dropzone.top{top:0;border-bottom:2px solid var(--divider)}
    .dropzone.bottom{bottom:0;border-top:none}
    .dropzone.has-image{border-style:solid;border-color:transparent}
    .photo{
      position:absolute;
      left:0;
      top:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:none;
      pointer-events:none;
      background:#fff;
    }
    .dropzone.has-image .photo{display:block}
    .placeholder{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(26,59,153,.16);
      font-size:48px;
      font-weight:100;
    }
    .dropzone.has-image .placeholder{display:none}

    /* ========== 右侧竖排标签 - 对齐图片 ========== */
    .side-label{
      position:absolute;
      right:0;
      width:60px;
      height:250px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg,var(--brand),var(--navy));
      writing-mode:vertical-rl;
      text-orientation:upright;
      color:#fff;
      font-size:32px;
      font-weight:600;
      letter-spacing:8px;
      border-radius:2px;
    }
    .side-label.top{ top: 165px; }
    .side-label.bottom{ bottom: 165px; }

    /* ========== 底部信息: top:1500px ========== */
    .footer-info{
      position:absolute;
      left:0;
      right:0;
      top:1500px;
      height:80px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .footer-copy{
      color:var(--brand);
      font-size:28px;
      font-weight:700;
      line-height:1;
      letter-spacing:2px;
    }
    .footer-sub{
      color:var(--brand);
      font-size:18px;
      font-weight:500;
      letter-spacing:1px;
    }

    /* ========== 底部横条: bottom:0, height:80px ========== */
    .bottom-strip{
      position:absolute;
      left:0;
      bottom:0;
      width:1080px;
      height:80px;
      background:linear-gradient(90deg,#2749d6 0%,#09184a 100%);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .bottom-text{
      color:#fff;
      font-size:16px;
      letter-spacing:2px;
      font-weight:500;
      text-align:center;
    }

    /* ========== 裁剪弹窗 ========== */
    .overlay{
      position:fixed;
      inset:0;
      height:100dvh;
      background:rgba(14,31,84,.5);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:200;
      padding:16px;
    }
    .overlay.open{display:flex}
    .crop-card{
      width:100%;
      max-width:380px;
      max-height:90dvh;
      border-radius:16px;
      overflow:hidden;
      background:#fff;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
      display:flex;
      flex-direction:column;
    }
    .crop-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 16px;
      color:#fff;
      background:linear-gradient(135deg,rgba(26,59,153,.98),rgba(10,26,74,.98));
    }
    .crop-head strong{font-size:15px}
    .crop-head span{font-size:12px;opacity:.84}
    .crop-body{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding:12px;
      flex:1;
      overflow:auto;
    }
    .crop-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .crop-actions .btn{
      flex:1 1 calc(50% - 4px);
      padding:10px 8px;
      border-radius:8px;
      font-size:13px;
    }
    .crop-stage-wrap{
      display:flex;
      justify-content:center;
      width:100%;
    }
    .crop-stage{
      position:relative;
      width:100%;
      max-width:340px;
      aspect-ratio:1000/580;
      border-radius:12px;
      overflow:hidden;
      background:#fff;
      border:1px solid rgba(26,59,153,.12);
      touch-action:none;
      cursor:grab;
    }
    .crop-stage:active{cursor:grabbing}
    .crop-tip{
      position:absolute;
      left:50%;
      bottom:12px;
      transform:translateX(-50%);
      z-index:2;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(10,26,74,.72);
      color:#fff;
      font-size:12px;
      white-space:nowrap;
      pointer-events:none;
    }
    .crop-stage img{
      position:absolute;
      left:0;
      top:0;
      transform-origin:0 0;
      pointer-events:none;
      user-select:none;
      background:#fff;
      will-change:transform;
    }
    .crop-grid{
      position:absolute;
      inset:0;
      background-image:linear-gradient(rgba(26,59,153,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(26,59,153,.06) 1px,transparent 1px);
      background-size:32px 32px;
      opacity:.35;
      pointer-events:none;
    }
    .crop-overlay{
      position:absolute;
      inset:0;
      border:2px solid rgba(26,59,153,.6);
      box-shadow:inset 0 0 0 9999px rgba(255,255,255,.12);
      pointer-events:none;
    }
    .crop-panel{
      display:grid;
      gap:10px;
    }
    .tool{
      padding:12px;
      border-radius:12px;
      background:#fff;
      border:1px solid rgba(26,59,153,.10);
      box-shadow:0 8px 20px rgba(15,29,68,.06);
    }
    .tool label{
      display:block;
      margin-bottom:8px;
      font-size:12px;
      color:rgba(16,32,74,.72);
    }
    .tool input[type=range]{width:100%}
    .tool-note{
      font-size:12px;
      line-height:1.6;
      color:rgba(16,32,74,.72);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <div class="group">
        <div class="badge" id="appBadge">案例对比海报</div>
        <div class="badge" id="sizeBadge">1080×1660</div>
      </div>
      <div class="group">
        <button class="btn secondary" id="resetBtn">重置</button>
        <button class="btn" id="downloadBtn">下载海报</button>
      </div>
    </div>

    <div class="workspace">
      <p class="hint">点击文字即可编辑；点击上/下图片区上传照片（1000×580px）</p>
      <div class="poster-wrap" id="posterWrap">
        <div class="poster" id="poster">
          <!-- 品牌栏 -->
          <div class="brand-bar">
            <div class="brand-left">
              <div class="brand-name editable" id="brandName" contenteditable="true" spellcheck="false">向雪岑<sup>®</sup></div>
              <div class="brand-divider"></div>
              <div class="brand-tagline editable" id="brandTagline" contenteditable="true" spellcheck="false">还原肌肤
健康美</div>
            </div>
            <div class="brand-right editable" id="brandRight" contenteditable="true" spellcheck="false">REVIVE HEALTH
AND BEAUTY OF THE SKIN</div>
          </div>

          <!-- 标题栏 -->
          <div class="title-bar">
            <div class="title editable" id="titleText" contenteditable="true" spellcheck="false">双C案例实操</div>
            <div class="title-tag">
              <div class="title-tag-text editable" id="titleTagText" contenteditable="true" spellcheck="false">黄褐斑、炎症后色沉、痘印</div>
            </div>
          </div>

          <!-- 对比区域 - 上下排列 -->
          <div class="compare-frame">
            <div class="compare-divider"></div>
            <div class="dropzone top" id="topZone" aria-label="治疗前图片区">
              <div class="placeholder">+</div>
            </div>
            <div class="dropzone bottom" id="bottomZone" aria-label="治疗后图片区">
              <div class="placeholder">+</div>
            </div>
            <!-- 右侧竖排标签 -->
            <div class="side-label top editable" id="topLabel" contenteditable="true" spellcheck="false">治疗前</div>
            <div class="side-label bottom editable" id="bottomLabel" contenteditable="true" spellcheck="false">治疗后</div>
          </div>

          <!-- 底部信息 -->
          <div class="footer-info">
            <div class="footer-copy editable" id="footerCopy" contenteditable="true" spellcheck="false">问题肌·学术派</div>
            <div class="footer-sub editable" id="footerSub" contenteditable="true" spellcheck="false">专研理论/专注教育/专精产品</div>
          </div>

          <!-- 底部横条 -->
          <div class="bottom-strip">
            <div class="bottom-text editable" id="bottomText" contenteditable="true" spellcheck="false">XIANGXUECEN PROBLEMATIC SKIN PROFESSIONAL EDUCATION</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" hidden>

  <!-- 裁剪弹窗 -->
  <div class="overlay" id="cropOverlay" aria-hidden="true">
    <div class="crop-card">
      <div class="crop-head">
        <strong id="cropTitle">裁切图片</strong>
        <span id="cropSubtitle">比例 1000:580</span>
      </div>
      <div class="crop-body">
        <div class="crop-actions">
          <button class="btn secondary" id="cropFit">适配</button>
          <button class="btn secondary" id="cropCenter">居中</button>
          <button class="btn secondary" id="cropReset">重置</button>
          <button class="btn secondary" id="cropCancel">取消</button>
          <button class="btn" id="cropConfirm" style="flex:1 1 100%">确认裁切</button>
        </div>
        <div class="crop-stage-wrap">
          <div class="crop-stage" id="cropStage">
            <img id="cropImage" alt="">
            <div class="crop-grid"></div>
            <div class="crop-overlay"></div>
            <div class="crop-tip">拖动调整 · 双指缩放</div>
          </div>
        </div>
        <div class="crop-panel">
          <div class="tool">
            <label for="zoomRange">缩放</label>
            <input type="range" id="zoomRange" min="1" max="4" step="0.01" value="1">
          </div>
          <div class="tool tool-note">适配：完整显示照片；居中：移动到中间；重置：恢复默认</div>
        </div>
      </div>
    </div>
  </div>

  <canvas id="exportCanvas" width="1080" height="1660" hidden></canvas>

  <script>
    (() => {
      const BASE = { w: 1080, h: 1660, zoneW: 1000, zoneH: 580 };
      const DEFAULTS = {
        brandName: '向雪岑®',
        brandTagline: '还原肌肤\n健康美',
        brandRight: 'REVIVE HEALTH\nAND BEAUTY OF THE SKIN',
        title: '双C案例实操',
        titleTagText: '黄褐斑、炎症后色沉、痘印',
        topLabel: '治疗前',
        bottomLabel: '治疗后',
        footerCopy: '问题肌·学术派',
        footerSub: '专研理论/专注教育/专精产品',
        bottomText: 'XIANGXUECEN PROBLEMATIC SKIN PROFESSIONAL EDUCATION'
      };

      const el = {
        poster: document.getElementById('poster'),
        posterWrap: document.getElementById('posterWrap'),
        fileInput: document.getElementById('fileInput'),
        cropOverlay: document.getElementById('cropOverlay'),
        cropStage: document.getElementById('cropStage'),
        cropImage: document.getElementById('cropImage'),
        zoomRange: document.getElementById('zoomRange'),
        exportCanvas: document.getElementById('exportCanvas'),
        ctx: document.getElementById('exportCanvas').getContext('2d'),
        topZone: document.getElementById('topZone'),
        bottomZone: document.getElementById('bottomZone'),
        cropFit: document.getElementById('cropFit'),
        cropCenter: document.getElementById('cropCenter'),
        cropReset: document.getElementById('cropReset'),
        cropCancel: document.getElementById('cropCancel'),
        cropConfirm: document.getElementById('cropConfirm'),
        resetBtn: document.getElementById('resetBtn'),
        downloadBtn: document.getElementById('downloadBtn'),
        brandName: document.getElementById('brandName'),
        brandTagline: document.getElementById('brandTagline'),
        brandRight: document.getElementById('brandRight'),
        titleText: document.getElementById('titleText'),
        titleTagText: document.getElementById('titleTagText'),
        topLabel: document.getElementById('topLabel'),
        bottomLabel: document.getElementById('bottomLabel'),
        footerCopy: document.getElementById('footerCopy'),
        footerSub: document.getElementById('footerSub'),
        bottomText: document.getElementById('bottomText')
      };

      const state = {
        activeZone: null,
        images: { top: null, bottom: null },
        crop: { scale: 1, x: 0, y: 0, drag: false, startX: 0, startY: 0, startImgX: 0, startImgY: 0 },
        cropView: { w: 0, h: 0 },
        pointers: new Map(),
        pinch: { active: false, startDist: 0, startScale: 1, startX: 0, startY: 0, midX: 0, midY: 0 }
      };

      function clamp(v, min, max){ return Math.min(max, Math.max(min, v)); }
      function getText(node, fallback){
        const text = (node.innerText || '').replace(/\u00A0/g, ' ').trim();
        return text || fallback;
      }
      function fitEditable(node, min = 0.7, max = 1){
        node.style.transform = 'scale(1)';
        let scale = max;
        while (scale >= min) {
          node.style.transform = `scale(${scale})`;
          if (node.scrollWidth <= node.clientWidth + 2 && node.scrollHeight <= node.clientHeight + 2) break;
          scale -= 0.02;
        }
      }
      function normalizeEditable(node, fallback, min = 0.7){
        const text = (node.innerText || '').replace(/\u00A0/g, ' ').trim();
        node.innerText = text || fallback;
        fitEditable(node, min, 1);
      }
      function bindEditable(node, fallback, min = 0.7){
        node.addEventListener('input', () => fitEditable(node, min, 1));
        node.addEventListener('blur', () => normalizeEditable(node, fallback, min));
        node.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            node.blur();
          }
        });
      }
      function syncFits(){
        [
          [el.brandName, 0.65],
          [el.brandTagline, 0.65],
          [el.brandRight, 0.65],
          [el.titleText, 0.55],
          [el.titleTagText, 0.7],
          [el.topLabel, 0.72],
          [el.bottomLabel, 0.72],
          [el.footerCopy, 0.72],
          [el.footerSub, 0.72],
          [el.bottomText, 0.8]
        ].forEach(([node, min]) => fitEditable(node, min, 1));
      }
      function syncPosterScale(){
        const scale = el.posterWrap.clientWidth / BASE.w;
        el.poster.style.transform = `scale(${scale})`;
        el.posterWrap.style.height = `${BASE.h * scale}px`;
        syncFits();
      }
      function loadImage(src){
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        });
      }
      function applyZoneImage(zone, dataUrl){
        let img = zone.querySelector('img.photo');
        if (!img) {
          img = document.createElement('img');
          img.className = 'photo';
          img.alt = '';
          zone.prepend(img);
        }
        img.src = dataUrl;
        zone.classList.add('has-image');
      }
      function updateCropView(){
        const rect = el.cropStage.getBoundingClientRect();
        state.cropView.w = rect.width;
        state.cropView.h = rect.height;
        return rect;
      }
      function cropBounds(){
        const viewW = state.cropView.w || el.cropStage.clientWidth;
        const viewH = state.cropView.h || el.cropStage.clientHeight;
        const minScale = Math.min(viewW / el.cropImage.naturalWidth, viewH / el.cropImage.naturalHeight);
        const w = el.cropImage.naturalWidth * state.crop.scale;
        const h = el.cropImage.naturalHeight * state.crop.scale;
        const x = w <= viewW ? (viewW - w) / 2 : 0;
        const y = h <= viewH ? (viewH - h) / 2 : 0;
        return {
          minScale,
          minX: w <= viewW ? x : viewW - w,
          maxX: w <= viewW ? x : 0,
          minY: h <= viewH ? y : viewH - h,
          maxY: h <= viewH ? y : 0
        };
      }
      function renderCropImage(){
        if (!el.cropImage.src) return;
        const s = state.crop.scale;
        el.cropImage.style.width = `${el.cropImage.naturalWidth * s}px`;
        el.cropImage.style.height = `${el.cropImage.naturalHeight * s}px`;
        el.cropImage.style.transform = `translate(${state.crop.x}px, ${state.crop.y}px)`;
      }
      function renderCroppedCanvas(source){
        const off = document.createElement('canvas');
        off.width = BASE.zoneW;
        off.height = BASE.zoneH;
        const octx = off.getContext('2d');
        octx.fillStyle = '#fff';
        octx.fillRect(0, 0, off.width, off.height);
        const viewW = state.cropView.w || el.cropStage.clientWidth;
        const viewH = state.cropView.h || el.cropStage.clientHeight;
        const exportScaleX = BASE.zoneW / viewW;
        const exportScaleY = BASE.zoneH / viewH;
        octx.drawImage(
          source,
          state.crop.x * exportScaleX,
          state.crop.y * exportScaleY,
          source.naturalWidth * state.crop.scale * exportScaleX,
          source.naturalHeight * state.crop.scale * exportScaleY
        );
        return off;
      }
      function clampCrop(){
        const b = cropBounds();
        state.crop.x = clamp(state.crop.x, b.minX, b.maxX);
        state.crop.y = clamp(state.crop.y, b.minY, b.maxY);
        renderCropImage();
      }
      function fitCropToFrame(){
        if (!el.cropImage.src) return;
        const viewW = state.cropView.w || el.cropStage.clientWidth;
        const viewH = state.cropView.h || el.cropStage.clientHeight;
        const fit = Math.min(viewW / el.cropImage.naturalWidth, viewH / el.cropImage.naturalHeight);
        state.crop.scale = fit;
        state.crop.x = (viewW - el.cropImage.naturalWidth * fit) / 2;
        state.crop.y = (viewH - el.cropImage.naturalHeight * fit) / 2;
        const sliderMin = fit;
        const sliderMax = Math.max(fit * 4, fit + 0.01);
        el.zoomRange.min = String(sliderMin);
        el.zoomRange.max = String(sliderMax);
        el.zoomRange.step = String(Math.max(0.001, fit / 200));
        el.zoomRange.value = String(fit);
        clampCrop();
      }
      function centerCropImage(){
        if (!el.cropImage.src) return;
        const drawW = el.cropImage.naturalWidth * state.crop.scale;
        const drawH = el.cropImage.naturalHeight * state.crop.scale;
        const viewW = state.cropView.w || el.cropStage.clientWidth;
        const viewH = state.cropView.h || el.cropStage.clientHeight;
        state.crop.x = (viewW - drawW) / 2;
        state.crop.y = (viewH - drawH) / 2;
        clampCrop();
      }
      function setCropScale(nextScale){
        if (!el.cropImage.src) return;
        const sliderMin = Number(el.zoomRange.min || 0.2);
        const sliderMax = Number(el.zoomRange.max || 4);
        const boundedScale = clamp(nextScale, sliderMin, sliderMax);
        const prev = state.crop.scale;
        const centerX = BASE.zoneW / 2;
        const centerY = BASE.zoneH / 2;
        const relX = (centerX - state.crop.x) / prev;
        const relY = (centerY - state.crop.y) / prev;
        state.crop.scale = boundedScale;
        state.crop.x = centerX - relX * state.crop.scale;
        state.crop.y = centerY - relY * state.crop.scale;
        clampCrop();
        el.zoomRange.value = String(state.crop.scale);
      }
      function closeCropper(){
        el.cropOverlay.classList.remove('open');
        el.cropOverlay.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        state.crop.drag = false;
        state.pointers.clear();
        state.pinch.active = false;
        if (el.cropImage.dataset.objectUrl) {
          URL.revokeObjectURL(el.cropImage.dataset.objectUrl);
          delete el.cropImage.dataset.objectUrl;
        }
        el.cropImage.src = '';
      }
      async function openCropper(file, zone){
        const objectUrl = URL.createObjectURL(file);
        state.activeZone = zone;
        document.getElementById('cropTitle').textContent = zone === 'top' ? '裁切治疗前图片' : '裁切治疗后图片';
        el.cropImage.src = objectUrl;
        el.cropImage.dataset.objectUrl = objectUrl;
        el.cropOverlay.classList.add('open');
        el.cropOverlay.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        await new Promise((resolve) => { el.cropImage.onload = resolve; });
        updateCropView();
        fitCropToFrame();
      }
      function stagePoint(clientX, clientY){
        const rect = el.cropStage.getBoundingClientRect();
        return { x: clientX - rect.left, y: clientY - rect.top };
      }
      function distance(a, b){
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        return Math.hypot(dx, dy);
      }

      // Canvas导出
      async function renderPosterToCanvas(scale = 2){
        const canvas = el.exportCanvas;
        const ctx = el.ctx;
        canvas.width = BASE.w * scale;
        canvas.height = BASE.h * scale;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.scale(scale, scale);

        const brandName = getText(el.brandName, DEFAULTS.brandName);
        const brandTagline = getText(el.brandTagline, DEFAULTS.brandTagline);
        const brandRight = getText(el.brandRight, DEFAULTS.brandRight);
        const title = getText(el.titleText, DEFAULTS.title);
        const titleTagText = getText(el.titleTagText, DEFAULTS.titleTagText);
        const topLabel = getText(el.topLabel, DEFAULTS.topLabel);
        const bottomLabel = getText(el.bottomLabel, DEFAULTS.bottomLabel);
        const footerCopy = getText(el.footerCopy, DEFAULTS.footerCopy);
        const footerSub = getText(el.footerSub, DEFAULTS.footerSub);
        const bottomText = getText(el.bottomText, DEFAULTS.bottomText);

        // 品牌栏
        ctx.fillStyle = '#1A3B99';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.font = '600 36px "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif';
        ctx.fillText(brandName.replace('®',''), 40, 50);
        ctx.fillRect(170, 30, 1, 40);
        ctx.font = '600 18px "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif';
        const tagLines = brandTagline.split('\n');
        ctx.fillText(tagLines[0] || '', 190, 45);
        ctx.fillText(tagLines[1] || '', 190, 65);

        ctx.fillStyle = '#4A6FD1';
        ctx.textAlign = 'right';
        ctx.font = '500 13px Arial, sans-serif';
        const rightLines = brandRight.split('\n');
        ctx.fillText(rightLines[0] || '', 1040, 42);
        ctx.fillText(rightLines[1] || '', 1040, 62);

        // 标题栏
        const titleGrad = ctx.createLinearGradient(0, 100, 1080, 300);
        titleGrad.addColorStop(0, '#2749D6');
        titleGrad.addColorStop(1, '#09184A');
        ctx.fillStyle = titleGrad;
        ctx.fillRect(0, 100, 1080, 200);

        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '700 84px "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif';
        ctx.fillText(title, 540, 170);

        // 白色标签
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.roundRect(360, 220, 360, 45, 8);
        ctx.fill();

        ctx.fillStyle = '#1A3B99';
        ctx.font = '600 22px "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif';
        ctx.fillText(titleTagText, 540, 242);

        // 对比区域边框
        ctx.strokeStyle = '#E0E0E0';
        ctx.lineWidth = 2;
        ctx.strokeRect(40, 320, 1000, 1160);
        ctx.beginPath();
        ctx.moveTo(40, 900);
        ctx.lineTo(960, 900);
        ctx.stroke();

        // 图片
        if (state.images.top) {
          const img = await loadImage(state.images.top);
          ctx.drawImage(img, 42, 322, 916, 576);
        }
        if (state.images.bottom) {
          const img = await loadImage(state.images.bottom);
          ctx.drawImage(img, 42, 902, 916, 576);
        }

        // 右侧竖排标签背景 - 与图片对齐
        const labelGrad = ctx.createLinearGradient(960, 0, 1040, 0);
        labelGrad.addColorStop(0, '#1A3B99');
        labelGrad.addColorStop(1, '#0A1A4A');
        ctx.fillStyle = labelGrad;
        ctx.fillRect(960, 485, 80, 250);
        ctx.fillRect(960, 1065, 80, 250);

        // 竖排文字
        ctx.fillStyle = '#fff';
        ctx.font = '600 32px "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif';
        ctx.textAlign = 'center';
        // 治疗前 - 竖排
        const topChars = topLabel.split('');
        topChars.forEach((char, i) => {
          ctx.fillText(char, 1000, 585 + i * 50);
        });
        // 治疗后 - 竖排
        const bottomChars = bottomLabel.split('');
        bottomChars.forEach((char, i) => {
          ctx.fillText(char, 1000, 1165 + i * 50);
        });

        // 底部信息
        ctx.fillStyle = '#1A3B99';
        ctx.font = '700 28px "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif';
        ctx.fillText(footerCopy, 540, 1530);
        ctx.font = '500 18px "Microsoft YaHei","PingFang SC","Noto Sans SC",sans-serif';
        ctx.fillText(footerSub, 540, 1565);

        // 底部横条
        const grad = ctx.createLinearGradient(0, 1580, 1080, 1580);
        grad.addColorStop(0, '#2749d6');
        grad.addColorStop(1, '#09184a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 1580, 1080, 80);

        ctx.fillStyle = '#fff';
        ctx.font = '500 16px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(bottomText, 540, 1620);

        ctx.restore();
        return canvas;
      }

      function resetAll(){
        el.brandName.innerText = DEFAULTS.brandName;
        el.brandTagline.innerText = DEFAULTS.brandTagline;
        el.brandRight.innerText = DEFAULTS.brandRight;
        el.titleText.innerText = DEFAULTS.title;
        el.titleTagText.innerText = DEFAULTS.titleTagText;
        el.topLabel.innerText = DEFAULTS.topLabel;
        el.bottomLabel.innerText = DEFAULTS.bottomLabel;
        el.footerCopy.innerText = DEFAULTS.footerCopy;
        el.footerSub.innerText = DEFAULTS.footerSub;
        el.bottomText.innerText = DEFAULTS.bottomText;
        state.images.top = null;
        state.images.bottom = null;
        el.topZone.classList.remove('has-image');
        el.bottomZone.classList.remove('has-image');
        el.topZone.querySelectorAll('img.photo').forEach((n) => n.remove());
        el.bottomZone.querySelectorAll('img.photo').forEach((n) => n.remove());
        syncFits();
      }

      // 绑定事件
      bindEditable(el.brandName, DEFAULTS.brandName, 0.65);
      bindEditable(el.brandTagline, DEFAULTS.brandTagline, 0.65);
      bindEditable(el.brandRight, DEFAULTS.brandRight, 0.65);
      bindEditable(el.titleText, DEFAULTS.title, 0.55);
      bindEditable(el.titleTagText, DEFAULTS.titleTagText, 0.7);
      bindEditable(el.topLabel, DEFAULTS.topLabel, 0.72);
      bindEditable(el.bottomLabel, DEFAULTS.bottomLabel, 0.72);
      bindEditable(el.footerCopy, DEFAULTS.footerCopy, 0.72);
      bindEditable(el.footerSub, DEFAULTS.footerSub, 0.72);
      bindEditable(el.bottomText, DEFAULTS.bottomText, 0.8);

      el.topZone.onclick = () => {
        state.activeZone = 'top';
        el.fileInput.value = '';
        el.fileInput.click();
      };
      el.bottomZone.onclick = () => {
        state.activeZone = 'bottom';
        el.fileInput.value = '';
        el.fileInput.click();
      };

      el.fileInput.onchange = (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file || !state.activeZone) return;
        openCropper(file, state.activeZone);
      };

      el.cropConfirm.onclick = async () => {
        const zone = state.activeZone;
        if (!zone || !el.cropImage.src) return;
        const source = await loadImage(el.cropImage.src);
        updateCropView();
        const off = renderCroppedCanvas(source);
        const dataUrl = off.toDataURL('image/png');
        state.images[zone] = dataUrl;
        applyZoneImage(zone === 'top' ? el.topZone : el.bottomZone, dataUrl);
        closeCropper();
      };

      // 裁剪区触摸/鼠标事件
      el.cropStage.addEventListener('pointerdown', (e) => {
        if (!el.cropImage.src) return;
        el.cropStage.setPointerCapture(e.pointerId);
        state.pointers.set(e.pointerId, stagePoint(e.clientX, e.clientY));
        if (state.pointers.size === 1) {
          state.crop.drag = true;
          state.pinch.active = false;
          const point = stagePoint(e.clientX, e.clientY);
          state.crop.startX = point.x;
          state.crop.startY = point.y;
          state.crop.startImgX = state.crop.x;
          state.crop.startImgY = state.crop.y;
        } else if (state.pointers.size === 2) {
          const [p1, p2] = [...state.pointers.values()];
          state.pinch.active = true;
          state.pinch.startDist = distance(p1, p2);
          state.pinch.startScale = state.crop.scale;
          state.pinch.startX = state.crop.x;
          state.pinch.startY = state.crop.y;
          state.pinch.midX = (p1.x + p2.x) / 2;
          state.pinch.midY = (p1.y + p2.y) / 2;
          state.crop.drag = false;
        }
      });
      el.cropStage.addEventListener('pointermove', (e) => {
        if (!el.cropImage.src || !state.pointers.has(e.pointerId)) return;
        state.pointers.set(e.pointerId, stagePoint(e.clientX, e.clientY));
        if (state.pinch.active && state.pointers.size >= 2) {
          const [p1, p2] = [...state.pointers.values()];
          const newDist = distance(p1, p2);
          const ratio = newDist / Math.max(1, state.pinch.startDist);
          const sliderMin = Number(el.zoomRange.min || 0.2);
          const sliderMax = Number(el.zoomRange.max || 4);
          const nextScale = clamp(state.pinch.startScale * ratio, sliderMin, sliderMax);
          const relX = (state.pinch.midX - state.pinch.startX) / state.pinch.startScale;
          const relY = (state.pinch.midY - state.pinch.startY) / state.pinch.startScale;
          state.crop.scale = nextScale;
          state.crop.x = state.pinch.midX - relX * state.crop.scale;
          state.crop.y = state.pinch.midY - relY * state.crop.scale;
          clampCrop();
          el.zoomRange.value = String(state.crop.scale);
          return;
        }
        if (state.crop.drag && state.pointers.size === 1 && !state.pinch.active) {
          const point = [...state.pointers.values()][0];
          state.crop.x = state.crop.startImgX + (point.x - state.crop.startX);
          state.crop.y = state.crop.startImgY + (point.y - state.crop.startY);
          clampCrop();
        }
      });
      function endPointer(e){
        state.pointers.delete(e.pointerId);
        if (state.pointers.size < 2) state.pinch.active = false;
        if (state.pointers.size === 0) state.crop.drag = false;
      }
      ['pointerup','pointercancel','pointerleave','pointerout'].forEach((type) => {
        el.cropStage.addEventListener(type, endPointer);
      });
      el.cropStage.addEventListener('wheel', (e) => {
        if (!el.cropImage.src) return;
        e.preventDefault();
        setCropScale(state.crop.scale * (e.deltaY > 0 ? 0.94 : 1.06));
      }, { passive:false });

      el.cropFit.addEventListener('click', fitCropToFrame);
      el.cropCenter.addEventListener('click', centerCropImage);
      el.cropReset.addEventListener('click', fitCropToFrame);
      el.cropCancel.addEventListener('click', closeCropper);
      el.cropOverlay.addEventListener('click', (e) => {
        if (e.target === el.cropOverlay) closeCropper();
      });
      el.zoomRange.addEventListener('input', () => setCropScale(parseFloat(el.zoomRange.value)));

      el.resetBtn.addEventListener('click', resetAll);
      el.downloadBtn.addEventListener('click', async () => {
        normalizeEditable(el.brandName, DEFAULTS.brandName, 0.65);
        normalizeEditable(el.brandTagline, DEFAULTS.brandTagline, 0.65);
        normalizeEditable(el.brandRight, DEFAULTS.brandRight, 0.65);
        normalizeEditable(el.titleText, DEFAULTS.title, 0.55);
        normalizeEditable(el.titleTagText, DEFAULTS.titleTagText, 0.7);
        normalizeEditable(el.topLabel, DEFAULTS.topLabel, 0.72);
        normalizeEditable(el.bottomLabel, DEFAULTS.bottomLabel, 0.72);
        normalizeEditable(el.footerCopy, DEFAULTS.footerCopy, 0.72);
        normalizeEditable(el.footerSub, DEFAULTS.footerSub, 0.72);
        normalizeEditable(el.bottomText, DEFAULTS.bottomText, 0.8);
        const canvas = await renderPosterToCanvas(2);
        const a = document.createElement('a');
        a.download = 'xiangxuecen-case-poster.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
      });

      window.addEventListener('resize', () => {
        syncPosterScale();
        if (el.cropOverlay.classList.contains('open')) {
          updateCropView();
          clampCrop();
        }
      });
      syncPosterScale();
      resetAll();
    })();
  </script>
</body>
</html>
